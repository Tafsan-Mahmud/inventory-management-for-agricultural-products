<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs><linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c6e3bd"/><stop offset="1" stop-color="#3b7730"/></linearGradient></defs>
  <rect width="400" height="400" fill="url(#g4)"/>
  <!-- farmer silhouette with tablet -->
  <g transform="translate(200 240)">
    <ellipse cy="140" rx="90" ry="14" fill="#000" opacity=".25"/>
    <!-- body -->
    <path d="M-55 40 Q-60 140 -40 140 L40 140 Q60 140 55 40 Z" fill="#305e28"/>
    <!-- head -->
    <circle cy="-30" r="38" fill="#FBBF24"/>
    <!-- hat -->
    <ellipse cy="-55" rx="65" ry="12" fill="#92400E"/>
    <path d="M-40 -55 Q-40 -80 0 -82 Q40 -80 40 -55 Z" fill="#78350F"/>
    <rect x="-30" y="-65" width="60" height="6" fill="#FDE68A"/>
    <!-- tablet -->
    <rect x="-50" y="30" width="100" height="70" rx="6" fill="#1F2937"/>
    <rect x="-45" y="35" width="90" height="60" rx="3" fill="#3b7730"/>
    <rect x="-40" y="42" width="30" height="6" fill="#9dcd8f"/>
    <rect x="-40" y="52" width="50" height="6" fill="#9dcd8f" opacity=".7"/>
    <rect x="-40" y="62" width="40" height="6" fill="#9dcd8f" opacity=".5"/>
    <!-- arms -->
    <path d="M-55 40 Q-80 70 -55 100" stroke="#305e28" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M55 40 Q80 70 55 100" stroke="#305e28" stroke-width="20" stroke-linecap="round" fill="none"/>
  </g>
  <!-- sun -->
  <circle cx="330" cy="80" r="35" fill="#FEF3C7" opacity=".8"/>
</svg>
