<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EA580C"/><stop offset="1" stop-color="#9A3412"/>
    </linearGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="#ffffff" opacity=".2"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dots)"/>
  
  <g transform="translate(300 210)">
    <ellipse cx="0" cy="0" rx="100" ry="80" fill="#FDE68A"/>
    <ellipse cx="0" cy="0" rx="100" ry="80" fill="url(#dots)"/>
    <g stroke="#D97706" stroke-width="2" fill="none" opacity=".6">
      <ellipse cx="0" cy="0" rx="90" ry="70"/>
      <ellipse cx="0" cy="0" rx="70" ry="55"/>
      <ellipse cx="0" cy="0" rx="50" ry="40"/>
      <ellipse cx="0" cy="0" rx="30" ry="25"/>
    </g>
    <g stroke="#92400E" stroke-width="1" opacity=".5">
      <line x1="-80" y1="-20" x2="-70" y2="-40"/>
      <line x1="60" y1="30" x2="70" y2="50"/>
      <line x1="-30" y1="-60" x2="-20" y2="-75"/>
      <line x1="50" y1="-40" x2="60" y2="-55"/>
    </g>
    <path d="M-120 80 L120 80" stroke="#3b7730" stroke-width="8"/>
  </g>
</svg>
